<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "surface-dim": "#d9dadb",
              "background": "#f8f9fa",
              "on-tertiary-fixed-variant": "#7b2f00",
              "error": "#ba1a1a",
              "primary": "#003f87",
              "primary-container": "#0056b3",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "surface": "#f8f9fa",
              "on-secondary-fixed-variant": "#34476a",
              "on-primary": "#ffffff",
              "on-primary-fixed": "#001a40",
              "error-container": "#ffdad6",
              "inverse-surface": "#2e3132",
              "tertiary-container": "#983c00",
              "primary-fixed-dim": "#acc7ff",
              "secondary-fixed": "#d7e2ff",
              "tertiary-fixed-dim": "#ffb694",
              "tertiary-fixed": "#ffdbcc",
              "secondary": "#4c5e84",

              "on-surface-variant": "#424752",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#041b3c",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#004491",
              "primary-fixed": "#d7e2ff",
              "on-primary-container": "#bbd0ff",
              "surface-bright": "#f8f9fa",
              "surface-tint": "#115cb9",
              "inverse-primary": "#acc7ff",
              "on-tertiary-container": "#ffc2a7",
              "outline": "#727784",
              "outline-variant": "#c2c6d4",
              "inverse-on-surface": "#f0f1f2",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-container">
<!-- TopAppBar -->
<header class="bg-white/85 dark:bg-slate-950/85 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_12px_40px_rgba(0,26,64,0.06)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">bolt</span>
<h1 class="font-manrope font-black tracking-tight uppercase text-xl text-blue-700 dark:text-blue-400">OmniSport-AI</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-2 border-primary-container/20">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a determined young male athlete with short hair, neutral background, soft professional lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4yeWdlFDc8Ui6ySWIIx5atIp_82rhYCnZhhC5brEslrjQFQaqqUVMaIaqRCtLn6QszbCH22_n2COyFFJK8rBfqRpr5cPOrMAgo3vQeAieqwMXgmRengJqVKYNYciuZGcSrfCNq16lFTkcTKqmijgvCSLZBnpJpBTQLGRe0F9LDUh8JiAbirtRTJWjS6jd3hElHbW7b5yoGphDimeOlK1mVQ0ycAA6R6eXPcLRnbgGJf2CqPAcqfAfS5MizuFYRz6Z3zXszTv8z20"/>
</div>
</header>
<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
<!-- Section Title: Asymmetric Editorial Style -->
<div class="mb-10 px-2">
<span class="font-label text-primary font-bold tracking-widest uppercase text-[10px] block mb-1">Rendimiento Pro</span>
<h2 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface leading-none">Mi Rutina</h2>
<div class="h-1 w-12 bg-primary-container mt-4 rounded-full"></div>
</div>
<!-- Progress Overview Bento -->
<div class="grid grid-cols-2 gap-3 mb-8">
<div class="bg-surface-container-lowest p-5 rounded-full shadow-[0_8px_30px_rgba(0,26,64,0.04)] flex flex-col justify-center items-center text-center">
<span class="text-3xl font-headline font-black text-primary">85%</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-outline">Completado</span>
</div>
<div class="bg-primary-container p-5 rounded-full shadow-lg shadow-primary-container/20 flex flex-col justify-center items-center text-center text-white">
<span class="material-symbols-outlined mb-1">timer</span>
<span class="text-xs font-bold uppercase tracking-wider">45 min restantes</span>
</div>
</div>
<!-- Routine List -->
<div class="space-y-4"><!-- Dynamic Exercise Item Template -->
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_8px_30px_rgba(0,26,64,0.04)] relative overflow-hidden group">
<div class="flex gap-4">
<div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0 bg-surface-container">
<img alt="{{entrenamientos/ejercicio_nombre}}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2lS2Lrj5hx2D55KtCEWusOtjeGPjnhA9MCaa_70hEztTzvUh1wotRWUntxnbbmucikfcC0MP24O0hK6az-hb15kOR3xt_LaT-arZwPgUJFPh5bhRbnUi6fxPaKYwxvNDxxd7RPP_Q3FuEOHMepAZih1oHGt2C05t6866Ab664Zq-mazXj7b9TgOQzhA1fUrSRYPjyr-iPJX4a8KjceHDy7tPEpIN3tTko29JpfKpwv3aYnfF95o__M9HJNyG-XaVNSihEKIaIBsY"/>
</div>
<div class="flex-1 flex flex-col justify-between py-1">
<div>
<h3 class="font-headline font-bold text-lg text-on-surface leading-tight">{{entrenamientos/ejercicio_nombre}}</h3>
<div class="flex gap-3 mt-1">
<span class="text-xs font-semibold text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-sm">rebase_edit</span> {{entrenamientos/series}} Series
          </span>
<span class="text-xs font-semibold text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-sm">history</span> {{entrenamientos/reps}} Reps
          </span>
</div>
</div>
<button class="flex items-center gap-2 text-primary font-bold text-xs hover:opacity-70 transition-opacity mt-2" onclick="window.location.href='{{entrenamientos/tecnica}}'">
<span>Ver Técnica</span>
<span class="material-symbols-outlined text-sm">play_circle</span>
</button>
</div>
</div>
</div></div>
<!-- Call to Action -->
<button class="w-full mt-12 py-5 bg-gradient-to-br from-blue-600 to-blue-800 text-white rounded-full font-headline font-extrabold tracking-tight text-lg shadow-xl shadow-blue-700/30 active:scale-95 transition-transform flex items-center justify-center gap-3">
<span>Iniciar Entrenamiento</span>
<span class="material-symbols-outlined">rocket_launch</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end pb-6 pt-3 px-4 bg-white dark:bg-slate-950 shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-500 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-inter text-[10px] font-bold tracking-wide">Dashboard</span>
</a>
<!-- Entrenamiento (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 to-blue-800 text-white rounded-full px-5 py-2 scale-110 -translate-y-1 shadow-lg active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="font-inter text-[10px] font-bold tracking-wide">Entrenamiento</span>
</a>
<!-- Torneos -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-500 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="emoji_events">emoji_events</span>
<span class="font-inter text-[10px] font-bold tracking-wide">Torneos</span>
</a>
<!-- Perfil -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-blue-500 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[10px] font-bold tracking-wide">Perfil</span>
</a>
</nav>
</body></html>
